<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tidodda's Lodestone Position Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>tidodda's Lodestone Position Finder</h1>
    <div class="panel">
      <h2>Lodestones</h2>
      <div id="rows"></div>
      <button id="addRow" class="btn">+ Add lodestone</button>
      <details class="json-box">
        <summary>JSON</summary>
        <textarea id="jsonInput" rows="3" placeholder='[{"x": -25000000, "z": 10000000, "sprite": 12}, ...]'></textarea>
        <div class="json-actions">
          <button id="loadJson" class="btn">Load</button>
          <button id="copyJson" class="btn">Copy current</button>
        </div>
      </details>
    </div>
    <button id="estimate" class="btn btn-main">Estimate position</button>
    <div class="panel result-panel" id="resultPanel" style="display:none">
      <h2>Result</h2>
      <div class="readout">
        <div class="readout-item"><span class="readout-label">X</span><span class="readout-value" id="outX">-</span></div>
        <div class="readout-item"><span class="readout-label">Z</span><span class="readout-value" id="outZ">-</span></div>
      </div>
      <div class="result-row"><span>Rough uncertainty</span><span id="outUncertainty">-</span></div>
      <div class="result-row"><span>Fit residual</span><span id="outResidual">-</span></div>
      <div class="result-row"><span>Method</span><span id="outMethod">-</span></div>
      <div class="map-label" id="overviewLabel" style="display:none">Overview</div>
      <svg id="resultMap" class="result-map" style="display:none"></svg>
      <div class="map-label" id="detailLabel" style="display:none">Feasible region (zoomed)</div>
      <svg id="resultMapDetail" class="result-map" style="display:none"></svg>
      <div class="poly-vertices" id="polyVertices" style="display:none"></div>
      <div class="warning-banner" id="outWarning" style="display:none"></div>
    </div>
    <div class="sprite-modal" id="spriteModal">
      <div class="sprite-modal-inner">
        <h3>Select the sprite that matches</h3>
        <div class="compass-picker">
          <button id="spritePrev" class="compass-arrow" aria-label="Previous">&lsaquo;</button>
          <div class="compass-display">
            <img id="compassImg" src="" alt="compass sprite">
            <span id="compassLabel">#00</span>
          </div>
          <button id="spriteNext" class="compass-arrow" aria-label="Next">&rsaquo;</button>
        </div>
        <button class="btn btn-main" id="confirmSprite">OK</button>
        <button class="btn" id="closeModal">Cancel</button>
      </div>
    </div>
    <footer>made by <a class="link" href="https://tidodda.dev" target="_blank" rel="noopener">tidodda</a></footer>
    <footer>source code <a class="link" href="https://github.com/tidodda/lodestone-locator" target="_blank" rel="noopener">here</a></footer>
  </div>
<script src="script.js"></script>
</body>
</html>
